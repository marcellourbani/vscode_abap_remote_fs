name: Release

on:
  push:
    branches:
      - master

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Create Release Pull Request
        if: "!contains(github.event.head_commit.message, 'Version Packages')"
        uses: changesets/action@v1
        with:
          version: ./scripts/version-packages.sh
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          CI: false

      - name: Build VSIX and Create Release
        if: "contains(github.event.head_commit.message, 'Version Packages')"
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npm run release:vsix
          gh release create v$VERSION *.vsix README.md CHANGELOG.md --title "v$VERSION" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Publish to VS Code Marketplace
        if: "contains(github.event.head_commit.message, 'Version Packages')"
        run: npx --yes @vscode/vsce publish --packagePath $(ls *.vsix) -p ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: "contains(github.event.head_commit.message, 'Version Packages')"
        run: npx --yes ovsx publish $(ls *.vsix) -p ${{ secrets.OVSX_PAT }}
