name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release to publish"
        required: true

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download VSIX from Release
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          version: ${{ github.event.inputs.version || github.event.release.tag_name }}
          file: '.*\.vsix'
          regex: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        run: npx --yes @vscode/vsce publish --packagePath $(ls *.vsix) -p ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: npx --yes ovsx publish $(ls *.vsix) -p ${{ secrets.OVSX_PAT }}
