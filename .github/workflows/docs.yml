name: Deploy Docs & Build DOCUMENTATION.md

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material pyyaml mdx_truly_sane_lists

      - name: Build DOCUMENTATION.md from docs/
        run: python scripts/build_docs.py

      - name: Commit DOCUMENTATION.md if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DOCUMENTATION.md
          git diff --staged --quiet || git commit -m "docs: auto-generate DOCUMENTATION.md from docs/"
          git push

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
